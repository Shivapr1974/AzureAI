<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <p class="eyebrow">FormIQ AI</p>
      <h1>Cora</h1>
      <p class="subtitle">Grounded intake, editable business case forms, and agent review workflows.</p>
    </div>

    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/chat" routerLinkActive="active">Chat</a>
      <a routerLink="/documents" routerLinkActive="active">Documents</a>
    </nav>

    <button type="button" class="reset-button" (click)="startFresh()" [disabled]="resetting">
      {{ resetting ? 'Resetting...' : 'Start New Session' }}
    </button>

    <section class="status-card" *ngIf="state$ | async as state">
      <p class="card-label">Session</p>
      <p class="session-id">{{ state.sessionId }}</p>
      <p class="card-label">Review Status</p>
      <span class="status-pill">{{ state.review.status }}</span>
    </section>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
