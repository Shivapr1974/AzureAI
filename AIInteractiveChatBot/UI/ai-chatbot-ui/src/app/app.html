<div class="chat-container">
  <h2>AI Chatbot</h2>

  <div class="upload-row">
    <input type="file" (change)="onFileSelected($event)" accept=".txt,.pdf" />
    <span class="upload-status">{{ uploadStatus }}</span>
  </div>

    <!-- <div class="workflow-bar">
    <button type="button" (click)="startWorkflow('create user')" [disabled]="loading">
      Create User
    </button>

    <button type="button" (click)="startWorkflow('create student')" [disabled]="loading">
      Create Student
    </button>

    <button type="button" (click)="startWorkflow('create bc form')" [disabled]="loading">
      Create BC Form
    </button>
  </div> -->

    <div class="chat-window" #chatWindow>
        <div class="chat-bands">
      <div class="chat-band" (click)="startWorkflow('create user')">
        Create User
      </div>

      <div class="chat-band" (click)="startWorkflow('create student')">
        Create Student
      </div>

      <div class="chat-band" (click)="startWorkflow('create bc form')">
        Create BC Form
      </div>
    </div>
    <div
      *ngFor="let message of messages"
      class="message"
      [ngClass]="message.sender"
    >
      <strong>{{ message.sender === 'user' ? 'You' : 'Bot' }}:</strong>
     <div class="message-text" [innerHTML]="message.text"></div>
    </div>
  </div>

  <div class="input-row">
    <input
      type="text"
      [(ngModel)]="question"
      placeholder="Type your question..."
      (keyup.enter)="sendMessage()"
    />
    <button (click)="sendMessage()" [disabled]="loading">
      {{ loading ? 'Sending...' : 'Send' }}
    </button>
  </div>

  <div class="result-panel" *ngIf="generatedUser">
    <h3>Created User</h3>
    <pre>{{ generatedUser | json }}</pre>
  </div>

  <div class="result-panel" *ngIf="generatedStudent">
    <h3>Created Student</h3>
    <pre>{{ generatedStudent | json }}</pre>
  </div>
  <div class="result-panel" *ngIf="generatedBcForm">
    <h3>Generated BC Form</h3>
    <pre>{{ generatedBcForm | json }}</pre>
  </div>

  <div class="result-panel" *ngIf="agentStatus">
    <p><strong>Status:</strong> {{ agentStatus }}</p>
  </div>
</div>
